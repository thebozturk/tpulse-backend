name: build
# main'e push (ve v* tag) → image'ları GHCR'a push'la.
# Sunucu bunları çeker (build SUNUCUDA yapılmaz). Bkz. tpulse-deploy.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/transferpulse/tpulse-backend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag
        id: vars
        run: echo "sha=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Runtime image (uygulama).
      - name: Build & push runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Migrate image (builder stage → prisma CLI dahil; migrate job bunu kullanır).
      - name: Build & push migrate
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          push: true
          tags: |
            ${{ env.IMAGE }}:migrate-latest
            ${{ env.IMAGE }}:migrate-${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
